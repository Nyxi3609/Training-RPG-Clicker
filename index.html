<!DOCTYPE html>
<html>
<head>
  <title>Training RPG</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HUD -->
  <div id="hud">
    <h2>💪 Training RPG</h2>

    <p id="power">Power: 1</p>
    <p id="coins">Coins: 0</p>
    <p id="round">Wave 1</p>

    <div id="monsterBox">
      <p id="monsterName">👹 Monster</p>

      <div id="monsterBarWrap">
        <div id="monsterBar"></div>
      </div>

      <p id="monsterHp">0 / 0</p>
    </div>
  </div>

  <!-- MAIN BUTTON -->
  <button id="trainBtn">⚔️ TRAIN</button>

  <!-- LEFT MENU -->
  <div id="menuButtons">
    <button id="statsBtn">📊 Stats</button>
    <button id="invBtn">🎒 Inventory</button>
    <button id="skillBtn">🌳 Skill Tree</button>
    <button id="achBtn">🏆 Achievements</button>
  </div>

  <!-- UPGRADE BUTTONS -->
  <div id="actions">
    <button id="upgradeBtn">💪 Upgrade Power (10)</button>
    <button id="autoBtn">⚡ Upgrade Speed (50)</button>
  </div>

  <!-- RIGHT PANEL -->
  <div id="panel"></div>

  <!-- TOAST POPUPS -->
  <div id="toast"></div>

  <!-- GAME JS -->
  <script src="game.js"></script>

</body>
</html>
